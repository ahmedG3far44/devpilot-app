version: '3.9'

services:
  mongo:
    image: mongo:4.4
    container_name: mongo-container
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - devpilot-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: server-container
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - devpilot-network
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.dev}
    environment:
      - NODE_ENV=${NODE_ENV:-development}

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: client-container
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - devpilot-network
    depends_on:
      - server
    env_file:
      - ${ENV_FILE:-.env.dev}
    environment:
      - NODE_ENV=${NODE_ENV:-development}

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/${NGINX_CONFIG:-default}.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - devpilot-network
    depends_on:
      - client
      - server

networks:
  devpilot-network:
    driver: bridge

volumes:
  mongo-data: